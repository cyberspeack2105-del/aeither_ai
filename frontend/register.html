<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Register - Root Nexus</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981",
                        "background-dark": "#0a0c10",
                        "surface-dark": "#161b22",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    backgroundImage: {
                        'grid-pattern': 'linear-gradient(to right, rgba(16, 185, 129, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(16, 185, 129, 0.05) 1px, transparent 1px)',
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0a0c10;
            background-image: radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.15), transparent 80%);
        }

        .glass {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="text-slate-200 font-display min-h-screen relative overflow-x-hidden">
    <!-- Grid Background -->
    <div class="absolute inset-0 bg-grid-pattern bg-[size:40px_40px] pointer-events-none opacity-20"></div>

    <div class="relative flex h-auto min-h-screen w-full flex-col">
        <nav class="sticky top-0 z-50 w-full border-b border-white/5 bg-background-dark/80 backdrop-blur-md">
            <div class="flex justify-center w-full px-4 sm:px-10 py-3">
                <div class="flex w-full max-w-[1280px] items-center justify-between">
                    <a href="index.html" class="flex items-center gap-4 text-white">
                        <img src="logo.png" alt="Logo" class="h-10 w-auto object-contain" />
                        <span class="text-xl font-bold tracking-tight">Aether <span class="text-primary">AI</span></span>
                    </a>
                </div>
            </div>
        </nav>

        <section class="flex-1 flex items-center justify-center py-12 px-4 sm:px-10 relative z-10">
            <div class="w-full max-w-md glass p-6 sm:p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden group">
                <div class="absolute -top-24 -right-24 size-48 bg-primary/10 rounded-full blur-3xl group-hover:bg-primary/20 transition-all duration-700"></div>
                
                <div class="relative z-10">
                    <div class="flex flex-col items-center mb-8">
                        <div class="size-16 rounded-2xl bg-primary/10 flex items-center justify-center text-primary mb-4 border border-primary/20">
                            <span class="material-symbols-outlined text-3xl">person_add</span>
                        </div>
                        <h2 class="text-3xl font-black text-white">Join Root Nexus</h2>
                        <p class="text-slate-500 text-sm mt-2 font-medium">Create your AI student profile</p>
                    </div>

                    <form id="registerForm" class="space-y-4">
                        <div>
                            <label for="name" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 pl-1">Name</label>
                            <input type="text" id="name" name="name" required
                                class="w-full rounded-2xl border-white/5 bg-white/5 p-4 text-sm text-white focus:ring-2 focus:ring-primary/50 focus:border-primary/50 transition-all outline-none"
                                placeholder="Full Name">
                        </div>

                        <div>
                            <label for="email" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 pl-1">Email</label>
                            <input type="email" id="email" name="email" required
                                class="w-full rounded-2xl border-white/5 bg-white/5 p-4 text-sm text-white focus:ring-2 focus:ring-primary/50 focus:border-primary/50 transition-all outline-none"
                                placeholder="you@email.com">
                        </div>

                        <div>
                            <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 pl-1">Password</label>
                            <input type="password" id="password" name="password" required
                                class="w-full rounded-2xl border-white/5 bg-white/5 p-4 text-sm text-white focus:ring-2 focus:ring-primary/50 focus:border-primary/50 transition-all outline-none"
                                placeholder="••••••••">
                        </div>

                        <div>
                            <label for="image" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 pl-1">Profile Image</label>
                            <input type="file" id="image" name="image" accept="image/*" required
                                class="w-full rounded-2xl border-white/5 bg-white/5 p-3 text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-primary/20 file:text-primary hover:file:bg-primary/30 transition-all cursor-pointer">
                        </div>

                        <button type="submit"
                            class="w-full rounded-2xl bg-primary py-4 text-white font-bold shadow-xl shadow-primary/25 hover:bg-primary/90 transition-all hover:scale-[1.02] active:scale-[0.98] mt-6">
                            Register
                        </button>
                    </form>

                    <p class="mt-8 text-center text-sm text-slate-500 font-medium">
                        Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Log in</a>
                    </p>
                </div>
            </div>
        </section>

        <footer class="py-10 text-center relative z-10 border-t border-white/5">
            <p class="text-slate-600 text-sm font-medium">
                © 2024 Powered by <a href="root.html" class="text-primary hover:underline font-bold">Root Nexus</a>
            </p>
        </footer>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const response = await fetch('http://127.0.0.1:8080/register', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    alert('Registration Successful! Please Login.');
                    window.location.href = 'login.html';
                } else {
                    const error = await response.json();
                    alert('Error: ' + error.detail);
                }
            } catch (err) {
                alert('Connection Error: ' + err.message);
            }
        });
    </script>
</body>

</html>
